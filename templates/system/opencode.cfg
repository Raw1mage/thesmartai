# OpenCode server runtime config (Single Source of Truth)
# Install path: /etc/opencode/opencode.cfg

# Network / URL
OPENCODE_PUBLIC_URL="https://crm.sob.com.tw"
OPENCODE_PORT="1080"
OPENCODE_HOSTNAME="0.0.0.0"
OPENCODE_FRONTEND_DEV_PORT="3000"

# Frontend bundle path (must be absolute; no silent fallback)
OPENCODE_FRONTEND_PATH="/home/pkcs12/projects/opencode/packages/app/dist"

# Runtime behaviors
OPENCODE_WEB_NO_OPEN="1"
OPENCODE_ALLOW_GLOBAL_FS_BROWSE="1"

# Auth
OPENCODE_AUTH_MODE="pam"
# OPENCODE_SERVER_HTPASSWD="/home/pkcs12/.config/opencode/.htpasswd"  # Required only when mode=htpasswd
# OPENCODE_SERVER_USERNAME="opencode"                                 # Optional when mode=legacy
