# OpenCode operator tunables.
# Install path: /etc/opencode/tweaks.cfg
#
# Format: key=value, one per line.
#   - '#' and ';' start comments (rest of line ignored).
#   - Blank lines allowed.
#   - Unknown keys are ignored with a warning in the daemon log.
#   - Invalid values are warned and fall back to the default below
#     (never silently — AGENTS.md rule 1).
#
# Daemon reads this file once at startup. Restart the daemon to apply changes.
# Override path via OPENCODE_TWEAKS_PATH env var (useful for tests).
#
# -----------------------------------------------------------------------------
# Session read cache (polling defence layer)
# -----------------------------------------------------------------------------
# In-process LRU cache for GET /api/v2/session/{id} and
# GET /api/v2/session/{id}/message. Invalidation is driven by bus events
# (MessageV2.Event.* and Session.Event.*) bridged from the worker process
# via publishBridgedEvent.

# Master switch. Set to 0 to disable caching entirely (every request reads
# from disk). Default: 1
session_cache_enabled=1

# TTL in seconds before a cached entry is considered stale and refreshed
# on next access (bus invalidation still takes precedence when it fires).
# Default: 60
session_cache_ttl_sec=60

# Maximum number of entries kept in the LRU before eviction. Each entry is
# a full session metadata record or message list snapshot. Default: 500
session_cache_max_entries=500

# -----------------------------------------------------------------------------
# Per-(username, method, routePattern) rate limit
# -----------------------------------------------------------------------------
# Token-bucket middleware. Exempt: /log, /api/v2/server/cache/health,
# /api/v2/server/health, and requests from hostname 'opencode.internal'.

# Master switch. Set to 0 to disable (all requests pass through, daemon logs
# a single info line at startup noting the bypass). Default: 1
ratelimit_enabled=1

# Token refill rate per second per (username, method, routePattern) key.
# With burst 20 and qps 10, a user can send 20 back-to-back requests and
# then 10 per second steady-state. Default: 10
ratelimit_qps_per_user_per_path=10

# Bucket capacity (burst). Default: 20
ratelimit_burst=20

# -----------------------------------------------------------------------------
# Frontend session lazy-load (specs/frontend-session-lazyload/)
# -----------------------------------------------------------------------------
# Controls whether the webapp uses meta-first auto-redirect, dynamic initial
# page size, part-level size cap, streaming tail-window, and scroll-spy
# auto-loadMore. Flag OFF = byte-equivalent baseline (INV-2).

# Master switch for the whole feature. 0 = disabled (subset of behavior: even
# /session/:id/meta endpoint exists on server but webapp does not call it).
# 1 = enabled. Default: 0 (rollout-gated).
frontend_session_lazyload=0

# Single part text cap in KB. Completed parts exceeding this size render as
# a preview + "expand full text" button. Range: [4, 4096]. Default: 64.
part_inline_cap_kb=64

# Streaming-part tail window in KB. While a part is streaming and exceeds
# this size, only the last N KB is kept in the client store to prevent
# AI-SDK rebuild storms from inflating the DOM. INV-4 + INV-7: must be <=
# part_inline_cap_kb; otherwise auto-clamped with a warning.
# Range: [4, 4096]. Default: 64.
tail_window_kb=64

# How many preview lines to render when a part is folded. Range: [1, 200].
# Default: 20.
fold_preview_lines=20

# Initial message-page size buckets (R6). The webapp picks one based on
# /session/:id/meta partCount: <= 50 -> small, 51-200 -> medium, > 200 -> large.
# "all" means no limit (fetch everything). Small default: "all".
initial_page_size_small=all

# Medium bucket: partCount 51-200. Range: [10, 1000]. Default: 100.
initial_page_size_medium=100

# Large bucket: partCount > 200. Range: [10, 1000]. Default: 50.
initial_page_size_large=50

# Session-size thresholds for the home-redirect escape hatch (R1). If EITHER
# bytes OR parts exceeds its threshold (OR relation, INV-7), the webapp
# redirects to /sessions instead of auto-loading the last session.

# Bytes threshold in KB. Range: [64, 1048576]. Default: 512.
session_size_threshold_kb=512

# Part-count threshold. Range: [10, 100000]. Default: 80.
session_size_threshold_parts=80

# -----------------------------------------------------------------------------
# Session UI freshness (specs/session-ui-freshness/)
# -----------------------------------------------------------------------------
# Controls whether the webapp degrades session-scoped UI elements (active-child
# dock, process-card, session status) when their underlying data has not been
# refreshed for a while. Freshness is tracked per-entry via a client-side
# receivedAt timestamp stamped when SSE events arrive — NOT via SSE connection
# health. Flag OFF = baseline render, byte-equivalent to pre-plan state.
# See specs/session-ui-freshness/design.md DD-3, DD-5, DD-6.

# Master switch. 0 = feature fully bypassed (receivedAt still written but UI
# always renders as fresh). 1 = enabled. Default: 0 (rollout-gated).
ui_session_freshness_enabled=0

# Soft threshold in seconds. Entries older than this show an "updated N ago"
# hint; content is still rendered. Range: [1, 3600]. Default: 15.
# Must be strictly less than ui_freshness_hard_timeout_sec; auto-clamped if not.
ui_freshness_threshold_sec=15

# Hard timeout in seconds. Entries older than this are grayed out, collapsed,
# or have their elapsed timer frozen (per component). Range: [1, 86400].
# Default: 60.
ui_freshness_hard_timeout_sec=60

# -----------------------------------------------------------------------------
# Codex / OpenAI subscription — runloop-end proactive rotation
# -----------------------------------------------------------------------------
# At the end of each runloop turn, check the just-used codex or openai
# subscription account's 5H usage window. If the remaining percentage drops
# below this threshold, mark the account rate-limited so the next turn's
# pre-flight rotates away from it (QUOTA_EXHAUSTED path, same as the existing
# post-error rotation). Accounts without a 5H window (free plans) are skipped.
# Range: [0, 100]. 0 disables the check entirely. Default: 10.
codex_rotation_low_quota_percent=10

# --- mobile-tail-first-simplification: session messages ---
# specs/mobile-tail-first-simplification 2026-04-24.
# One initial-load path: tail-first. No SSE replay buffer, no
# Last-Event-ID, no cursor-pagination-on-cold-open, no force-refetch.
# Client opens a session -> server returns last N messages; older
# history loads only when the user explicitly scrolls up.

# Number of messages returned on cold open when the client omits `limit`.
# Range: [5, 200]. Default: 30.
session_messages_default_tail=30

# Mobile tail size. Opening a session on a mobile viewport fetches the
# last N messages. Sized so the 100-message global cap holds ~5 sessions
# worth of initial history before rotation kicks in. Range: [5, 500].
# Default: 20.
session_tail_mobile=20

# Desktop tail size. Same contract as mobile but a wider window for
# larger viewports. Range: [5, 2000]. Default: 100.
session_tail_desktop=100

# GLOBAL store cap (messages across ALL open sessions, not per-session)
# for mobile. When the grand total of messages in the client store
# exceeds this, the oldest non-streaming message is evicted regardless
# of which session it belongs to. Range: [30, 2000]. Default: 100.
session_store_cap_mobile=100

# GLOBAL store cap for desktop. Same semantics as mobile.
# Range: [50, 5000]. Default: 200.
session_store_cap_desktop=200

# Per-part byte cap applied at the wire/store layer. Parts larger than
# this are truncated to their tail and annotated with truncatedPrefix;
# the `expand` action fetches the full part via the scoped endpoint.
# Range: [16000, 16000000]. Default: 512000 (~500 KB).
session_part_cap_bytes=512000

# --- autonomous-opt-in: verbal arm / disarm (specs/autonomous-opt-in/) ---
# Type any trigger phrase below in a user message to flip
# workflow.autonomous.enabled ON for that session; a disarm phrase flips
# it OFF. Matching is case-insensitive substring (anywhere in the message).
# Phrases are pipe-separated (`|`) so individual phrases may contain
# commas. Set to an empty value to disable detection entirely.
autorun_trigger_phrases=接著跑|自動跑|開 autonomous|autorun|keep going|continue autonomously
autorun_disarm_phrases=停|暫停|stop|halt

# --- tool-output-chunking Layer 2: per-tool output bounding (specs/tool-output-chunking/) ---
# Variable-size tools (read / glob / grep / bash / webfetch / apply_patch /
# task / system-manager_read_subsession) cap their own output to a
# per-invocation token budget computed as
#   min(round(model.contextWindow * tool_output_budget_context_ratio),
#       tool_output_budget_absolute_cap)
# floored at tool_output_budget_minimum_floor. Tools `task` and `bash`
# substitute their per-tool override for the absolute cap because their
# natural output density differs from the generic case.

# Hard absolute ceiling on a tool's output, in tokens.
# Range: [1000, 1000000]. Default: 50000.
tool_output_budget_absolute_cap=50000

# Fraction of the active model's context window allowed for a single
# tool result. Smaller of (this * contextWindow) and absoluteCap wins.
# Range: (0, 1]. Default: 0.30.
tool_output_budget_context_ratio=0.30

# Floor below which the budget is never reduced even on tiny-context
# models. Ensures every tool gets a workable slice.
# Range: [100, 100000]. Default: 8000.
tool_output_budget_minimum_floor=8000

# Per-tool override of absoluteCap for the `task` (subagent) tool. Child
# summaries are usually high-density so a larger budget is reasonable.
# Range: [1000, 1000000]. Default: 60000.
tool_output_budget_task_override=60000

# Per-tool override of absoluteCap for the `bash` tool. Stdout is
# typically lower-density so a smaller budget protects context.
# Range: [1000, 1000000]. Default: 40000.
tool_output_budget_bash_override=40000

# --- tool-output-chunking Layer 1: hybrid-llm compaction (specs/tool-output-chunking/) ---
# Knobs governing the bounded-input recursive compaction kind that
# replaces the previous narrative→replay-tail→low-cost-server→llm-agent
# →chunked-digest chain.

# Hard timeout per LLM_compact attempt, milliseconds. Exceed → abort and
# treat as failure; recovery ladder takes over (DD-6).
# Range: [5000, 300000]. Default: 30000 (30s).
compaction_llm_timeout_ms=30000

# Optional fallback provider for compaction. Format: "provider:model"
# (e.g. "anthropic:claude-haiku-4-5"). When the in-provider stricter
# retry exhausts, runtime tries one compaction call against this
# fallback before graceful degradation. Empty = skip fallback step.
# Default: empty (no fallback).
compaction_fallback_provider=

# Phase 2 stricter framing target tokens. Phase 2 fires when Phase 1's
# result still overflows OR pinned_zone exceeds its cap. Smaller =
# more ruthless distillation. Range: [1000, 50000]. Default: 5000.
compaction_phase2_max_anchor_tokens=5000

# Hard cap on pinned_zone size as a fraction of the active model's
# context window (DD-5). When pinned_zone exceeds this, the next
# compaction is forced into Phase 2 absorbing the zone. Defends against
# defensive over-pinning. Range: (0, 1]. Default: 0.30 (30%).
compaction_pinned_zone_max_tokens_ratio=0.30

